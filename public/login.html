<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — L3HO Football API</title>
  <link rel="icon" type="image/png" href="/attached_assets/1001854641-removebg-preview_1764606701240.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #050b18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 60%);
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      width: 420px;
      max-width: 95vw;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo-wrap {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-wrap img { width: 42px; height: 42px; object-fit: contain; }
    .logo-wrap .brand { font-family: 'Orbitron', sans-serif; }
    .logo-wrap .brand .top { font-size: 20px; font-weight: 900; color: #00d4ff; letter-spacing: 3px; }
    .logo-wrap .brand .sub { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.4); }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: #fff; text-align: center; letter-spacing: 2px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 36px; }
    .security-badge {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15);
      border-radius: 50px; padding: 8px 16px; margin-bottom: 32px; font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .security-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00d4ff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .form-group { margin-bottom: 16px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus { border-color: rgba(0,212,255,0.4); }
    .login-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border: none; border-radius: 12px; cursor: pointer;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      transition: opacity 0.2s; margin-top: 8px;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px; margin-top: 16px;
      color: #ef4444; font-size: 13px; display: none; text-align: center;
    }
    .loading-box {
      text-align: center; margin-top: 16px; color: rgba(255,255,255,0.5);
      font-size: 13px; display: none;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,212,255,0.3);
      border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .restricted-note {
      text-align: center; font-size: 11px; color: rgba(255,255,255,0.25);
      margin-top: 24px; line-height: 1.6;
    }
    .restricted-note span { color: rgba(0,212,255,0.6); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <img src="/attached_assets/1001854641-removebg-preview_1764606701240.png" alt="L3HO">
      <div class="brand">
        <div class="top">L3HO</div>
        <div class="sub">INTERACTIVE</div>
      </div>
    </div>
    <h1>ADMIN ACCESS</h1>
    <p class="subtitle">Panel de administración de API Keys</p>
    <div class="security-badge">
      <span class="dot"></span>
      Acceso restringido · Solo administradores
    </div>
    <div class="form-group">
      <input class="form-input" type="password" id="passwordInput" placeholder="Contraseña de administrador" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Iniciar sesión</button>
    <div class="error-box" id="errorBox"></div>
    <div class="loading-box" id="loadingBox">
      <span class="spinner"></span> Verificando...
    </div>
    <p class="restricted-note">
      Solo administradores autorizados<br>tienen acceso a este panel.
    </p>
  </div>

  <script>
    const passwordInput = document.getElementById('passwordInput');
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const password = passwordInput.value;
      const btn = document.getElementById('loginBtn');
      const errorBox = document.getElementById('errorBox');
      const loadingBox = document.getElementById('loadingBox');
      errorBox.style.display = 'none';
      btn.disabled = true;
      loadingBox.style.display = 'block';

      try {
        const res = await fetch('/api-admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          const dest = new URLSearchParams(window.location.search).get('redirect') || '/admin';
          window.location.href = dest;
        } else {
          errorBox.textContent = data.error || 'Contraseña incorrecta.';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'Error de conexión. Intenta de nuevo.';
        errorBox.style.display = 'block';
      } finally {
        loadingBox.style.display = 'none';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
