<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — L3HO Football API</title>
  <link rel="icon" type="image/png" href="/attached_assets/1001854641-removebg-preview_1764606701240.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #050b18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 60%);
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      width: 420px;
      max-width: 95vw;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo-wrap {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-wrap img { width: 42px; height: 42px; object-fit: contain; }
    .logo-wrap .brand { font-family: 'Orbitron', sans-serif; }
    .logo-wrap .brand .top { font-size: 20px; font-weight: 900; color: #00d4ff; letter-spacing: 3px; }
    .logo-wrap .brand .sub { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.4); }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: #fff; text-align: center; letter-spacing: 2px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 36px; }
    .security-badge {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15);
      border-radius: 50px; padding: 8px 16px; margin-bottom: 32px; font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .security-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00d4ff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .google-btn {
      width: 100%; padding: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
      transition: all 0.2s; text-decoration: none;
    }
    .google-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(0,212,255,0.4); transform: translateY(-1px); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .error-box {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px; margin-top: 16px;
      color: #ef4444; font-size: 13px; display: none; text-align: center;
    }
    .loading-box {
      text-align: center; margin-top: 16px; color: rgba(255,255,255,0.5);
      font-size: 13px; display: none;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,212,255,0.3);
      border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { text-align: center; margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 12px; }
    .restricted-note {
      text-align: center; font-size: 11px; color: rgba(255,255,255,0.25);
      margin-top: 24px; line-height: 1.6;
    }
    .restricted-note span { color: rgba(0,212,255,0.6); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="card">
    <div class="logo-wrap">
      <img src="/attached_assets/1001854641-removebg-preview_1764606701240.png" alt="L3HO">
      <div class="brand">
        <div class="top">L3HO</div>
        <div class="sub">INTERACTIVE</div>
      </div>
    </div>
    <h1>ADMIN ACCESS</h1>
    <p class="subtitle">Panel de administración de API Keys</p>
    <div class="security-badge">
      <span class="dot"></span>
      Acceso restringido · Solo administradores
    </div>
    <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>
    <div class="error-box" id="errorBox"></div>
    <div class="loading-box" id="loadingBox">
      <span class="spinner"></span> Verificando identidad...
    </div>
    <p class="restricted-note">
      Solo el correo <span>santiagoeduardo331@gmail.com</span><br>tiene acceso a este panel.
    </p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHAptclAjSVJP3iDNzqrLbs9bQ3272SrU",
      authDomain: "apik-9510b.firebaseapp.com",
      projectId: "apik-9510b",
      storageBucket: "apik-9510b.firebasestorage.app",
      messagingSenderId: "275629352874",
      appId: "1:275629352874:web:b5094a86ac51251c6d6dd3",
      measurementId: "G-P1BZ3SVMEC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: 'santiagoeduardo331@gmail.com' });

    const ALLOWED_EMAIL = 'santiagoeduardo331@gmail.com';

    // If already logged in with the right account, go straight to the main page
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === ALLOWED_EMAIL) {
        const dest = new URLSearchParams(window.location.search).get('redirect') || '/';
        window.location.href = dest;
      }
    });

    window.signInWithGoogle = async () => {
      const btn = document.getElementById('googleBtn');
      const errorBox = document.getElementById('errorBox');
      const loadingBox = document.getElementById('loadingBox');
      errorBox.style.display = 'none';
      btn.disabled = true;
      loadingBox.style.display = 'block';

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if (user.email !== ALLOWED_EMAIL) {
          await signOut(auth);
          errorBox.textContent = `Acceso denegado. El correo ${user.email} no está autorizado.`;
          errorBox.style.display = 'block';
          loadingBox.style.display = 'none';
          btn.disabled = false;
          return;
        }

        const dest = new URLSearchParams(window.location.search).get('redirect') || '/';
        window.location.href = dest;
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          errorBox.textContent = 'Error al iniciar sesión. Intenta de nuevo.';
          errorBox.style.display = 'block';
        }
        loadingBox.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
