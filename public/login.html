<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - L3HO Interactive</title>
    <link rel="icon" type="image/png" href="/attached_assets/1001854641-removebg-preview_1764606701240.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #00ff88;
            --green-dim: #00cc6a;
            --dark: #0a0a0f;
            --card: #111118;
            --border: rgba(0,255,136,0.15);
        }
        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,255,136,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .grid {
            position: fixed; inset: 0; z-index: 0; opacity: 0.03;
            background-image: linear-gradient(#00ff88 1px, transparent 1px), linear-gradient(90deg, #00ff88 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .card {
            position: relative; z-index: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,255,136,0.05), 0 24px 48px rgba(0,0,0,0.5);
        }
        .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
        .logo-wrap img { width: 48px; height: 48px; object-fit: contain; }
        .logo-wrap .brand { text-align: left; }
        .logo-wrap .brand-name { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; color: var(--green); }
        .logo-wrap .brand-sub { font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        p.sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 36px; line-height: 1.5; }
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.3px;
        }
        .btn-google:hover { background: var(--green-dim); box-shadow: 0 0 24px rgba(0,255,136,0.3); }
        .btn-google:active { transform: scale(0.98); }
        .btn-google:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-google svg { flex-shrink: 0; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 0.75rem; color: rgba(255,255,255,0.3); }
        .security-note {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.75rem; color: rgba(255,255,255,0.3);
            padding: 12px 16px;
            background: rgba(0,255,136,0.03);
            border: 1px solid rgba(0,255,136,0.08);
            border-radius: 8px;
        }
        .security-note span { color: var(--green); }
        #error-msg {
            display: none;
            background: rgba(255,60,60,0.1);
            border: 1px solid rgba(255,60,60,0.3);
            color: #ff6b6b;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: left;
        }
        #loading {
            display: none;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 16px;
        }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(0,255,136,0.3);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="grid"></div>

    <div class="card">
        <div class="logo-wrap">
            <img src="/attached_assets/1001854641-removebg-preview_1764606701240.png" alt="L3HO">
            <div class="brand">
                <div class="brand-name">L3HO</div>
                <div class="brand-sub">Interactive</div>
            </div>
        </div>

        <h1>Acceso Privado</h1>
        <p class="sub">Esta API es de uso privado.<br>Solo puedes entrar con tu cuenta autorizada.</p>

        <div id="error-msg"></div>

        <button class="btn-google" id="btn-login" onclick="handleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#000" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#000" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#000" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#000" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Iniciar sesión con Google
        </button>

        <div id="loading"><span class="spinner"></span>Verificando...</div>

        <div class="divider"><span>SEGURIDAD</span></div>

        <div class="security-note">
            <span>🔒</span>
            <span>Solo <span>Santiagoeduardo331@gmail.com</span> tiene acceso</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCHAptclAjSVJP3iDNzqrLbs9bQ3272SrU",
            authDomain: "apik-9510b.firebaseapp.com",
            projectId: "apik-9510b",
            storageBucket: "apik-9510b.firebasestorage.app",
            messagingSenderId: "275629352874",
            appId: "1:275629352874:web:7028e3a61097d7476d6dd3",
            measurementId: "G-S6DZL6ZGH0"
        };

        const ALLOWED_EMAIL = 'santiagoeduardo331@gmail.com';
        const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

        const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        async function handleUser(user) {
            if (!user) return;
            const email = user.email?.toLowerCase();
            if (email !== ALLOWED_EMAIL) {
                showError('Acceso denegado. Solo la cuenta autorizada puede entrar.');
                await auth.signOut();
                return;
            }
            showLoading('Verificando acceso...');
            try {
                const idToken = await user.getIdToken();
                const resp = await fetch('/auth/firebase-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Acceso denegado.');
                    await auth.signOut();
                    hideLoading();
                }
            } catch {
                showError('Error de conexión. Inténtalo de nuevo.');
                hideLoading();
            }
        }

        getRedirectResult(auth).then(result => {
            if (result?.user) handleUser(result.user);
        }).catch(err => {
            if (err.code && err.code !== 'auth/no-current-user') {
                showError(getErrorMsg(err.code));
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email?.toLowerCase() === ALLOWED_EMAIL) {
                handleUser(user);
            }
        });

        window.handleLogin = async function() {
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            hideError();

            if (isMobile) {
                showLoading('Redirigiendo a Google...');
                try {
                    await signInWithRedirect(auth, provider);
                } catch (err) {
                    showError(getErrorMsg(err.code));
                    btn.disabled = false;
                    hideLoading();
                }
                return;
            }

            showLoading('Abriendo Google...');
            try {
                const result = await signInWithPopup(auth, provider);
                await handleUser(result.user);
            } catch (err) {
                if (err.code === 'auth/popup-blocked') {
                    showLoading('Redirigiendo a Google...');
                    await signInWithRedirect(auth, provider);
                    return;
                }
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    showError(getErrorMsg(err.code));
                }
            } finally {
                btn.disabled = false;
                hideLoading();
            }
        };

        function getErrorMsg(code) {
            if (code === 'auth/unauthorized-domain') {
                return 'Este dominio no está autorizado en Firebase. Agrégalo en Firebase Console → Authentication → Authorized domains.';
            }
            if (code === 'auth/popup-blocked') return 'Popup bloqueado. Intenta de nuevo.';
            if (code === 'auth/network-request-failed') return 'Sin conexión a internet.';
            return 'Error al iniciar sesión. Inténtalo de nuevo.';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            hideLoading();
        }
        function hideError() { document.getElementById('error-msg').style.display = 'none'; }
        function showLoading(msg) {
            const el = document.getElementById('loading');
            el.textContent = msg || 'Cargando...';
            el.style.display = 'block';
        }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }
    </script>
</body>
</html>
