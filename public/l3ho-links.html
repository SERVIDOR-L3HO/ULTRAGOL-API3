<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L3HO ELITE · Transmisiones en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #00d4ff;
            --accent2: #a855f7;
            --accent3: #f97316;
            --accent-glow: rgba(0,212,255,0.25);
            --glass-bg: rgba(255,255,255,0.04);
            --glass-bg-hover: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.10);
            --glass-border-accent: rgba(0,212,255,0.35);
            --bg-deep: #04050d;
            --text: #f0f0f2;
            --text-2: #8a8aa0;
            --text-3: #404055;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --src-1: #f97316;
            --src-2: #06b6d4;
            --src-3: #a855f7;
            --src-4: #22c55e;
            --src-5: #3b82f6;
            --src-6: #ec4899;
            --src-7: #eab308;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            animation: drift 20s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) { width: 600px; height: 600px; background: #00d4ff; top: -200px; left: -200px; animation-delay: 0s; }
        .bg-orb:nth-child(2) { width: 500px; height: 500px; background: #a855f7; bottom: -150px; right: -150px; animation-delay: -7s; }
        .bg-orb:nth-child(3) { width: 400px; height: 400px; background: #f97316; top: 40%; left: 40%; animation-delay: -14s; }

        @keyframes drift {
            0%, 100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,-30px) scale(1.05); }
            66% { transform: translate(-30px,40px) scale(0.95); }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border-accent); border-radius: 4px; }

        /* ── GLASS MIXIN (applied via class) ── */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(4,5,13,0.75);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
            height: 62px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .header-sep { width: 1px; height: 22px; background: var(--glass-border); flex-shrink: 0; }

        .header-search {
            flex: 1;
            max-width: 380px;
            position: relative;
        }

        .header-search input {
            width: 100%;
            padding: 9px 16px 9px 38px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(10px);
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--glass-border-accent);
            background: rgba(0,212,255,0.04);
        }

        .header-search input::placeholder { color: var(--text-3); }

        .search-ico {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 13px;
            pointer-events: none;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 13px;
            background: rgba(239,68,68,0.10);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: 0.5px;
        }

        .pulse { width: 7px; height: 7px; background: #ef4444; border-radius: 50%; animation: pulse-r 1.4s infinite; }

        @keyframes pulse-r {
            0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
            50% { opacity: 0.6; transform: scale(0.85); box-shadow: 0 0 0 4px rgba(239,68,68,0); }
        }

        .total-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-2);
            letter-spacing: 1px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 9px;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            font-size: 15px;
        }

        .header-btn:hover { border-color: var(--glass-border-accent); color: var(--accent); }
        .header-btn.spinning svg { animation: spin 1s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .view-toggle {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 9px;
            overflow: hidden;
        }

        .view-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
        }

        .view-btn.active { background: rgba(0,212,255,0.12); color: var(--accent); }
        .view-btn:hover:not(.active) { color: var(--text-2); }

        /* ── LAYOUT ── */
        .layout {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            align-items: start;
            position: relative;
            z-index: 1;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: sticky;
            top: 82px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            transition: border-color 0.2s;
        }

        .sidebar-card:hover { border-color: rgba(255,255,255,0.15); }

        .sidebar-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .sport-list { display: flex; flex-direction: column; gap: 2px; }

        .sport-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 9px;
            color: var(--text-2);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
            width: 100%;
        }

        .sport-btn:hover { background: var(--glass-bg-hover); color: var(--text); }

        .sport-btn.active {
            background: rgba(0,212,255,0.08);
            border-color: rgba(0,212,255,0.2);
            color: var(--accent);
            font-weight: 600;
        }

        .sport-emoji { font-size: 14px; width: 20px; text-align: center; }

        .sport-count {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-3);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        /* ── SOURCE HEALTH ── */
        .source-list { display: flex; flex-direction: column; gap: 6px; }

        .source-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            text-align: left;
        }

        .source-item:hover { border-color: rgba(255,255,255,0.15); }
        .source-item.inactive { opacity: 0.35; }

        .source-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: box-shadow 0.3s;
        }

        .source-dot.online { animation: pulse-src 2s infinite; }

        @keyframes pulse-src {
            0%,100% { box-shadow: 0 0 0 0 currentColor; }
            50% { box-shadow: 0 0 0 3px transparent; }
        }

        .source-name { font-size: 11px; font-weight: 600; color: var(--text-2); flex: 1; }
        .source-item.inactive .source-name { color: var(--text-3); }

        .source-status {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .source-status.ok { background: rgba(34,197,94,0.12); color: var(--green); }
        .source-status.err { background: rgba(239,68,68,0.12); color: var(--red); }
        .source-status.chk { background: rgba(255,255,255,0.06); color: var(--text-3); }

        .source-count { font-size: 10px; color: var(--text-3); font-family: 'Orbitron', sans-serif; font-weight: 700; }

        /* ── STATS ── */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .stat-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-val.red { color: var(--red); }
        .stat-val.green { color: var(--green); }

        .stat-lbl { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }

        /* ── MAIN ── */
        .main { min-width: 0; }

        /* ── FILTERS BAR ── */
        .filters-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        .filter-pill:hover { border-color: rgba(0,212,255,0.3); color: var(--accent); }

        .filter-pill.active {
            background: rgba(0,212,255,0.1);
            border-color: rgba(0,212,255,0.4);
            color: var(--accent);
        }

        .pill-count {
            background: rgba(255,255,255,0.08);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
        }

        .filter-pill.active .pill-count { background: var(--accent); color: #000; }

        .filters-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sort-select {
            padding: 6px 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 9px;
            color: var(--text-2);
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            backdrop-filter: blur(10px);
            appearance: none;
        }

        .sort-select:focus { outline: none; border-color: var(--glass-border-accent); }

        /* ── GRID / LIST ── */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .events-grid.list-view {
            grid-template-columns: 1fr;
        }

        /* ── EVENT CARD ── */
        .event-card {
            position: relative;
            background: rgba(255,255,255,0.035);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .event-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .event-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,212,255,0.08), 0 0 30px rgba(0,212,255,0.06);
        }

        .event-card.selected {
            border-color: rgba(0,212,255,0.5);
            background: rgba(0,212,255,0.05);
        }

        /* List view card */
        .list-view .event-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
        }

        .list-view .card-list-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .list-view .card-list-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .list-view .card-top,
        .list-view .card-body,
        .list-view .card-url,
        .list-view .card-actions,
        .list-view .card-teams { display: none; }
        .list-view .card-list-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-view .card-list-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }

        /* Grid view hides list-specific elements */
        .events-grid:not(.list-view) .card-list-left,
        .events-grid:not(.list-view) .card-list-right { display: none; }

        .card-top {
            padding: 12px 12px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .source-badge {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .card-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .card-teams {
            padding: 0 12px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .team-logo {
            width: 38px;
            height: 38px;
            object-fit: contain;
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
        }

        .team-vs {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .team-placeholder {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 18px;
        }

        .card-body { padding: 0 12px 10px; }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 7px;
        }

        .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: 0.5px;
            background: var(--glass-bg);
            padding: 3px 7px;
            border-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .tag-live {
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            border-color: rgba(239,68,68,0.25);
        }

        .tag-soon {
            background: rgba(234,179,8,0.12);
            color: #eab308;
            border-color: rgba(234,179,8,0.25);
        }

        .card-url {
            font-family: monospace;
            font-size: 9px;
            color: var(--text-3);
            background: rgba(0,0,0,0.25);
            padding: 5px 10px;
            margin: 0 12px 10px;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .card-actions {
            padding: 0 12px 12px;
            display: flex;
            gap: 7px;
        }

        .btn-watch {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 0;
            background: linear-gradient(135deg, rgba(0,212,255,0.8), rgba(168,85,247,0.8));
            border: none;
            border-radius: 9px;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-watch:hover {
            background: linear-gradient(135deg, rgba(0,212,255,1), rgba(168,85,247,1));
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
            transform: translateY(-1px);
        }

        .btn-icon {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 9px;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .btn-icon:hover { border-color: rgba(0,212,255,0.3); color: var(--accent); }
        .btn-icon.copied { border-color: var(--green); color: var(--green); }

        /* ── SOURCE COLORS ── */
        .src-1 { background: rgba(249,115,22,0.12); color: var(--src-1); }
        .src-2 { background: rgba(6,182,212,0.12); color: var(--src-2); }
        .src-3 { background: rgba(168,85,247,0.12); color: var(--src-3); }
        .src-4 { background: rgba(34,197,94,0.12); color: var(--src-4); }
        .src-5 { background: rgba(59,130,246,0.12); color: var(--src-5); }
        .src-6 { background: rgba(236,72,153,0.12); color: var(--src-6); }
        .src-7 { background: rgba(234,179,8,0.12); color: var(--src-7); }

        /* ── LOADING ── */
        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 20px;
        }

        .loader-ring {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(0,212,255,0.1);
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            animation: spin 0.9s linear infinite;
        }

        .loading-txt {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--text-3);
            letter-spacing: 3px;
        }

        .loading-sources {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .loading-src-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink-src 1.5s ease-in-out infinite;
        }

        .loading-src-dot:nth-child(1) { background: var(--src-1); animation-delay: 0s; }
        .loading-src-dot:nth-child(2) { background: var(--src-2); animation-delay: 0.2s; }
        .loading-src-dot:nth-child(3) { background: var(--src-3); animation-delay: 0.4s; }
        .loading-src-dot:nth-child(4) { background: var(--src-4); animation-delay: 0.6s; }
        .loading-src-dot:nth-child(5) { background: var(--src-5); animation-delay: 0.8s; }
        .loading-src-dot:nth-child(6) { background: var(--src-6); animation-delay: 1.0s; }

        @keyframes blink-src {
            0%,100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ── EMPTY ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.15; }
        .empty-text { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--text-3); letter-spacing: 2px; }
        .empty-sub { font-size: 12px; color: var(--text-3); margin-top: 18px; margin-bottom: 8px; }
        .empty-suggest {
            display: inline-block; margin: 4px;
            padding: 7px 16px; border-radius: 20px;
            background: var(--glass-bg); border: 1px solid rgba(0,212,255,0.2);
            color: var(--accent); font-size: 12px; cursor: pointer;
            transition: all 0.15s;
        }
        .empty-suggest:hover { background: rgba(0,212,255,0.1); }

        /* ── SELECTION BAR ── */
        .sel-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(4,5,13,0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0,212,255,0.35);
            border-radius: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,212,255,0.15);
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sel-bar.visible { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .sel-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
        }

        .sel-divider { width: 1px; height: 18px; background: var(--glass-border); }

        .sel-btn {
            padding: 7px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-2);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .sel-btn:hover { border-color: rgba(0,212,255,0.3); color: var(--accent); }

        .sel-btn.primary {
            background: linear-gradient(135deg, rgba(0,212,255,0.9), rgba(168,85,247,0.9));
            border-color: transparent;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 1px;
        }

        .sel-btn.primary:hover { box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
        .sel-btn.danger { border-color: rgba(239,68,68,0.3); color: #ef4444; }
        .sel-btn.danger:hover { border-color: #ef4444; }

        @media (max-width: 600px) {
            .sel-bar { bottom: 0; left: 0; right: 0; transform: translateY(100%); border-radius: 16px 16px 0 0; width: 100%; max-width: 100%; flex-wrap: wrap; justify-content: center; padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 12px)); gap: 8px; border-left: none; border-right: none; border-bottom: none; }
            .sel-bar.visible { transform: translateY(0); }
            .sel-btn { flex: 1; text-align: center; padding: 11px 10px; }
            .sel-btn.primary { order: -1; flex: 100%; }
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            top: 74px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            padding: 9px 22px;
            background: rgba(34,197,94,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 20px;
            color: var(--green);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 2px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
            z-index: 2000;
        }

        .toast.visible { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .toast.error-toast { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--red); }

        /* ── PLAYER MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            z-index: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
        }

        .modal-overlay.visible { opacity: 1; visibility: visible; }

        .modal {
            background: rgba(10,12,25,0.92);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 18px;
            width: 92vw;
            max-width: 920px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 60px rgba(0,212,255,0.08);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;

        .modal-close {
            width: 30px;

            display: flex;

            border: 1px solid var(--glass-border);

            color: var(--text-2);

        .modal-player {

        .modal-player iframe {

        /* ── FOOTER ── */
        footer {

            z-index: 1;

            border-top: 1px solid var(--glass-border);

        .footer-brand {

            background-clip: text;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .footer-sub { font-size: 11px; color: var(--text-3); }

        /* ── MOBILE ── */
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; display: none; }
            .sidebar.mobile-open { display: flex; }

            .header-inner { gap: 10px; }
            .logo-text { display: none; }

            .view-toggle { display: none; }

        /* ── COUNT UP ANIMATION ── */
        @keyframes countUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .count-anim { animation: countUp 0.4s ease-out; }
    </style>
</head>

<script>
    /* ── STATE ── */
    let allLinks = [];
    let selectedLinks = new Map();
    let activeSport = 'todos';
    let activeEstado = 'todos';
    let activeSources = new Set();
    let currentView = 'grid';
    let lastUpdated = null;

    /* ── SOURCES CONFIG ── */
    const SOURCES = [
        { key: 'Rereyano',    label: 'Rereyano',     cls: 'src-1', endpoint: '/transmisiones'  },
        { key: 'StreamCenter',label: 'StreamCenter',  cls: 'src-2', endpoint: '/transmisiones2' },
        { key: 'E1Link',      label: 'E1Link',        cls: 'src-3', endpoint: '/transmisiones3' },
        { key: 'SportOnline', label: 'Sport Online',  cls: 'src-4', endpoint: '/transmisiones4' },
        { key: 'DonRomans',   label: 'Gol-5',          cls: 'src-5', endpoint: '/gol-5'          },
        { key: 'WP',          label: 'WP Source',     cls: 'src-6', endpoint: '/transmisiones6' },
        { key: 'Extra',       label: 'Extra',         cls: 'src-7', endpoint: '/transmisiones7' },
    ];

    const SOURCE_CLASS = Object.fromEntries(SOURCES.map(s => [s.key, s.cls]));
    let sourceStatus = {};  // key -> 'ok' | 'err' | 'chk'
    let sourceCounts = {};  // key -> number

    /* ── SPORT DETECTION ── */
    const SPORT_KW = {
        futbol: ['futbol','soccer','liga','premier','laliga','bundesliga','serie a','ligue','champions','europa','copa','mundial','fc','united','city','real madrid','barcelona','america','chivas','cruz azul','tigres','monterrey','pumas','mls','concacaf','fútbol','liga mx'],
        basketball: ['nba','basketball','baloncesto','lakers','celtics','warriors','bulls','heat','nets','knicks','timberwolves','pacers','hornets'],
        baseball: ['mlb','baseball','béisbol','beisbol','yankees','dodgers','red sox','cubs','mets','astros','padres'],
        hockey: ['nhl','hockey','oilers','avalanche','predators','kraken','leafs','canadiens'],
        nfl: ['nfl','football americano','super bowl','patriots','cowboys','packers','chiefs','eagles','bears'],
        box: ['box','boxing','boxeo','ufc','mma','fight','pelea','canelo','tyson','fury','wwe','lucha'],
        f1: ['f1','formula 1','formula1','nascar','racing','gran premio','gp','motogp','indycar','motor']
    };

    const SPORT_ICON = { futbol:'⚽', basketball:'🏀', baseball:'⚾', hockey:'🏒', nfl:'🏈', box:'🥊', f1:'🏎️' };

    function detectSport(link) {
        const text = (link.name + ' ' + (link.deporte || '')).toLowerCase();
        for (const [s, kws] of Object.entries(SPORT_KW)) {
            if (kws.some(k => text.includes(k))) return s;
        }
        return null;
    }

    /* ── FILTER LOGIC ── */
    function matchesSport(l) { return activeSport === 'todos' || detectSport(l) === activeSport; }
    function matchesEstado(l) { return activeEstado === 'todos' || (l.estado || 'Programado') === activeEstado; }
    function matchesSource(l) { return activeSources.has(l.source); }
    function matchesSearch(l, q) {
        if (!q) return true;
        const srcLabel = (SOURCES.find(s => s.key === l.source)?.label || l.source);
        const hay = [l.name, l.source, srcLabel, l.deporte, l.league].filter(Boolean).join(' ').toLowerCase();
        return q.split(' ').every(w => hay.includes(w));
    }

    function applyFilters() {
        const rawQ = document.getElementById('search-input').value.trim();
        const q = rawQ.toLowerCase();
        const sort = document.getElementById('sort-select').value;

        let filtered = allLinks.filter(l => matchesSport(l) && (rawQ ? true : matchesEstado(l)) && matchesSource(l) && matchesSearch(l, q));

        if (sort === 'source') filtered.sort((a,b) => a.source.localeCompare(b.source));
        else if (sort === 'status') {
            const ord = {'En vivo':0,'Por comenzar':1,'Programado':2};
            filtered.sort((a,b) => (ord[a.estado]??2) - (ord[b.estado]??2));
        } else {
            filtered.sort((a,b) => a.name.localeCompare(b.name, 'es', {sensitivity:'base'}));
        }

        renderCards(filtered);
        document.getElementById('stat-filtered').textContent = filtered.length;
    }

    /* ── FILTER BUTTONS ── */
    function filterSport(sport) {
        activeSport = sport;
        document.querySelectorAll('.sport-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
        applyFilters();
    }

    function filterEstado(estado) {
        activeEstado = estado;
        const map = {'todos':'pill-todos','En vivo':'pill-live','Por comenzar':'pill-soon','Programado':'pill-sched'};
        document.querySelectorAll('[id^="pill-"]').forEach(p => p.classList.remove('active'));
        if (map[estado]) document.getElementById(map[estado])?.classList.add('active');
        applyFilters();
    }

    function toggleSource(key) {
        if (activeSources.has(key)) activeSources.delete(key);
        else activeSources.add(key);
        renderSourceList();
        document.getElementById('stat-sources').textContent = activeSources.size;
        applyFilters();
    }

    /* ── VIEW TOGGLE ── */
    function setView(v) {
        currentView = v;
        const grid = document.getElementById('events-grid');
        grid.classList.toggle('list-view', v === 'list');
        document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
        document.getElementById('btn-list').classList.toggle('active', v === 'list');
    }

    /* ── UPDATE COUNTS ── */
    function updateCounts() {
        const total = allLinks.length;
        const live  = allLinks.filter(l => l.estado === 'En vivo').length;
        const soon  = allLinks.filter(l => l.estado === 'Por comenzar').length;
        const sched = allLinks.filter(l => l.estado === 'Programado').length;

        animateCount('stat-total', total);
        animateCount('stat-live', live);
        document.getElementById('total-badge').textContent = total + ' EVENTOS';
        document.getElementById('pc-todos').textContent = total;
        document.getElementById('pc-live').textContent = live;
        document.getElementById('pc-soon').textContent = soon;
        document.getElementById('pc-sched').textContent = sched;

        if (live > 0) {
            document.getElementById('live-indicator').style.display = 'flex';
            document.getElementById('live-count-num').textContent = live;
        } else {
            document.getElementById('live-indicator').style.display = 'none';
        }

        ['futbol','basketball','baseball','hockey','nfl','box','f1'].forEach(s => {
            const n = allLinks.filter(l => detectSport(l) === s).length;
            const el = document.getElementById('sc-' + s);
            if (el) el.textContent = n;
        });
        document.getElementById('sc-todos').textContent = total;

        // source counts
        const counts = {};
        allLinks.forEach(l => { counts[l.source] = (counts[l.source] || 0) + 1; });
        sourceCounts = counts;
        renderSourceList();
    }

    function animateCount(id, val) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = val;
        el.classList.remove('count-anim');
        void el.offsetWidth;
        el.classList.add('count-anim');
    }

    /* ── RENDER SOURCE LIST ── */
    function renderSourceList() {
        const container = document.getElementById('source-list');
        const knownSources = SOURCES.filter(s => sourceCounts[s.key] !== undefined || activeSources.has(s.key));
        const displaySources = knownSources.length > 0 ? knownSources : SOURCES.slice(0, 6);

        container.innerHTML = displaySources.map(s => {
            const active = activeSources.has(s.key);
            const st = sourceStatus[s.key] || 'chk';
            const count = sourceCounts[s.key] || 0;
            const statusLabel = st === 'ok' ? 'OK' : st === 'err' ? 'ERR' : '···';
            const statusCls = st === 'ok' ? 'ok' : st === 'err' ? 'err' : 'chk';
            const dotCls = st === 'ok' ? 'online' : '';
            const dotColor = `var(--${s.cls.replace('src-','src-')})`;
            return `
            <button class="source-item${active ? '' : ' inactive'}" onclick="toggleSource('${s.key}')">
                <span class="source-dot ${dotCls}" style="background:var(--${s.cls.replace('src-','src-')});color:var(--${s.cls.replace('src-','src-')})"></span>
                <span class="source-name">${s.label}</span>
                <span class="source-status ${statusCls}">${statusLabel}</span>
                <span class="source-count">${count || ''}</span>
            </button>`;
        }).join('');
    }

    /* ── RENDER CARDS ── */
    function renderCards(links) {
        const grid = document.getElementById('events-grid');
        if (!links.length) {
            const q = document.getElementById('search-input').value.trim();
            let suggestion = '';
            if (q && allLinks.length > 0) {
                const words = q.toLowerCase().split(' ').filter(Boolean);
                const close = allLinks.filter(l => {
                    const hay = (l.name||'').toLowerCase();
                    return words.some(w => w.length >= 3 && hay.includes(w));
                }).slice(0, 3);
                suggestion = close.length
                    ? `<p class="empty-sub">¿Quisiste decir?</p>` + close.map(l => {
                        const base = l.name.replace(/ - (Opcion|ESPN|beIN|TUDN|FOX|NBC|ABC|NFL).*$/i,'').trim();
                        return `<div class="empty-suggest" onclick="document.getElementById('search-input').value='${base.replace(/'/g,"\\'")}';applyFilters()">${base}</div>`;
                      }).join('')
                    : `<p class="empty-sub">No hay transmisiones para ese término.<br>Prueba con el nombre completo del equipo.</p>`;
            }
            grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p class="empty-text">Sin resultados${q ? ` para "${q}"` : ''}</p>${suggestion}</div>`;
            return;
        }

        const isList = currentView === 'list';

        grid.innerHTML = links.map(link => {
            const srcCls = SOURCE_CLASS[link.source] || 'src-1';
            const estado = link.estado || 'Programado';
            const sport = detectSport(link);
            const sportIcon = SPORT_ICON[sport] || '🎯';
            const isSelected = selectedLinks.has(link.url);
            const url = link.url;

            const statusTag = estado === 'En vivo'
                ? `<span class="meta-tag tag-live">🔴 EN VIVO</span>`
                : estado === 'Por comenzar'
                ? `<span class="meta-tag tag-soon">🟡 PRONTO</span>`
                : '';

            const horaTag = link.hora ? `<span class="meta-tag">⏰ ${link.hora}</span>` : '';
            const depTag = `<span class="meta-tag">${sportIcon}</span>`;

            if (isList) {
                return `
                <div class="event-card${isSelected?' selected':''}" data-url="${encodeURIComponent(url)}" data-name="${encodeURIComponent(link.name)}">
                    <div class="card-list-left">
                        <input type="checkbox" class="card-checkbox" ${isSelected?'checked':''} onchange="toggleSel('${encodeURIComponent(url)}','${encodeURIComponent(link.name)}',this.checked)" onclick="event.stopPropagation()">
                        <span class="source-badge ${srcCls}">${link.source}</span>
                        <div>
                            <div class="card-list-title">${link.name}</div>
                            <div class="card-list-meta">${statusTag}${horaTag}${depTag}</div>
                        </div>
                    </div>
                    <div class="card-list-right">
                        <button class="btn-watch" style="padding:8px 16px;font-size:9px" onclick="openPlayer('${url.replace(/'/g,"\\'")}','${link.name.replace(/'/g,"\\'")}')">▶ VER</button>
                        <button class="btn-icon" onclick="copyLink(this,'${url.replace(/'/g,"\\'")}',event)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>`;
            }

            const logoSection = (link.logo1 || link.logo2) ? `
                <div class="card-teams">
                    ${link.logo1 ? `<img class="team-logo" src="${link.logo1}" alt="" onerror="this.style.display='none'">` : `<div class="team-placeholder">${sportIcon}</div>`}
                    <span class="team-vs">VS</span>
                    ${link.logo2 ? `<img class="team-logo" src="${link.logo2}" alt="" onerror="this.style.display='none'">` : `<div class="team-placeholder">${sportIcon}</div>`}
                </div>` : '';

            return `
            <div class="event-card${isSelected?' selected':''}" data-url="${encodeURIComponent(url)}" data-name="${encodeURIComponent(link.name)}">
                <div class="card-top">
                    <span class="source-badge ${srcCls}">${link.source}</span>
                    <input type="checkbox" class="card-checkbox" ${isSelected?'checked':''} onchange="toggleSel('${encodeURIComponent(url)}','${encodeURIComponent(link.name)}',this.checked)" onclick="event.stopPropagation()">
                </div>
                ${logoSection}
                <div class="card-body">
                    <div class="card-title">${link.name}</div>
                    <div class="card-meta">${statusTag}${horaTag}${depTag}</div>
                </div>
                <div class="card-url">${url}</div>
                <div class="card-actions">
                    <button class="btn-watch" onclick="openPlayer('${url.replace(/'/g,"\\'")}','${link.name.replace(/'/g,"\\'")}')">▶ VER</button>
                    <button class="btn-icon" onclick="copyLink(this,'${url.replace(/'/g,"\\'")}',event)">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    /* ── PLAYER ── */
    function openPlayer(url, title) {
        document.getElementById('player-iframe').src = url;
        document.getElementById('modal-title').textContent = title || 'REPRODUCIENDO';
        document.getElementById('player-modal').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }

    function closePlayer(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('player-iframe').src = '';
        document.getElementById('player-modal').classList.remove('visible');
        document.body.style.overflow = '';
    }

    /* ── SELECTION ── */
    function toggleSel(encUrl, encName, checked) {
        const url = decodeURIComponent(encUrl);
        const name = decodeURIComponent(encName);
        const card = document.querySelector(`[data-url="${encUrl}"]`);
        if (checked) { selectedLinks.set(url, name); card?.classList.add('selected'); }
        else { selectedLinks.delete(url); card?.classList.remove('selected'); }
        updateSelBar();
    }

    function selectAll() {
        document.querySelectorAll('.event-card').forEach(card => {
            const url = decodeURIComponent(card.dataset.url);
            const name = decodeURIComponent(card.dataset.name);
            selectedLinks.set(url, name);
            card.classList.add('selected');
            const cb = card.querySelector('.card-checkbox');
            if (cb) cb.checked = true;
        });
        updateSelBar();
    }

    function deselectAll() {
        selectedLinks.clear();
        document.querySelectorAll('.event-card').forEach(card => {
            card.classList.remove('selected');
            const cb = card.querySelector('.card-checkbox');
            if (cb) cb.checked = false;
        });
        updateSelBar();
    }

    function updateSelBar() {
        const bar = document.getElementById('sel-bar');
        const n = selectedLinks.size;
        if (n > 0) {
            bar.classList.add('visible');
            document.getElementById('sel-count').textContent = `${n} seleccionado${n>1?'s':''}`;
        } else {
            bar.classList.remove('visible');
        }
    }

    function copySelectedLinks() {
        if (!selectedLinks.size) return;
        let text = `📡 L3HO ELITE · Links de Transmisión\n\n`;
        let i = 1;
        for (const [url, name] of selectedLinks) {
            text += `${i}. ${name}\n${url}\n\n`;
            i++;
        }
        copyText(text, `${selectedLinks.size} LINK${selectedLinks.size>1?'S':''} COPIADO${selectedLinks.size>1?'S':''}`);
    }

    /* ── COPY / TOAST ── */
    function copyLink(btn, url, event) {
        if (event) event.stopPropagation();
        copyText(url, 'LINK COPIADO');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        }, 2000);
    }

    function copyText(text, msg) {
        navigator.clipboard.writeText(text).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        });
        showToast(msg);
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (isError ? ' error-toast' : '');
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 2500);
    }

    /* ── LOAD DATA ── */
    async function loadData(silent = false) {
        if (!silent) {
            document.getElementById('events-grid').innerHTML = `
                <div class="loading-state">
                    <div class="loader-ring"></div>
                    <div class="loading-sources">
                        <div class="loading-src-dot"></div><div class="loading-src-dot"></div>
                        <div class="loading-src-dot"></div><div class="loading-src-dot"></div>
                        <div class="loading-src-dot"></div><div class="loading-src-dot"></div>
                    </div>
                    <p class="loading-txt">Cargando Transmisiones</p>
                </div>`;
        }

        // Mark all sources as checking
        SOURCES.forEach(s => { sourceStatus[s.key] = 'chk'; });
        renderSourceList();

        try {
            const res = await fetch('/api/l3ho-links');
            const data = await res.json();

            if (!data.success) throw new Error('API error');

            allLinks = data.links;

            // Determine which sources appear in the data
            const foundSources = new Set(allLinks.map(l => l.source));
            SOURCES.forEach(s => {
                sourceStatus[s.key] = foundSources.has(s.key) ? 'ok' : 'err';
            });

            // Init active sources if first load
            if (activeSources.size === 0) {
                SOURCES.forEach(s => activeSources.add(s.key));
            }

            const now = new Date();
            lastUpdated = now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

            updateCounts();
            applyFilters();

        } catch(e) {
            SOURCES.forEach(s => { sourceStatus[s.key] = 'err'; });
            renderSourceList();
            document.getElementById('events-grid').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <p class="empty-text">Error al cargar transmisiones</p>
                    <p class="empty-sub">Verifica tu conexión e intenta de nuevo.</p>
                    <div class="empty-suggest" onclick="refreshData()">🔄 Reintentar</div>
                </div>`;
            showToast('Error al cargar datos', true);
        }
    }

    async function refreshData() {
        const btn = document.getElementById('refresh-btn');
        btn.classList.add('spinning');
        showToast('ACTUALIZANDO...');
        await loadData(true);
        btn.classList.remove('spinning');
        showToast('ACTUALIZADO ✓');
    }

    /* ── KEYBOARD SHORTCUTS ── */
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closePlayer();
            deselectAll();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
            e.preventDefault();
            document.getElementById('search-input').focus();
        }
    });

    /* ── INIT ── */
    document.getElementById('search-input').addEventListener('input', applyFilters);

    // Initial source list skeleton
    renderSourceList();

    loadData();

    // Auto-refresh every 5 minutes
    setInterval(() => loadData(true), 5 * 60 * 1000);
</script>
</body>
</html>
