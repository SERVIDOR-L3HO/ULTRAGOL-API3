<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L3HO ELITE · Transmisiones en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #ff8c00;
            --orange-dim: rgba(255,140,0,0.15);
            --orange-glow: rgba(255,140,0,0.35);
            --bg: #080809;
            --bg-card: #0f0f11;
            --bg-card2: #141416;
            --bg-glass: rgba(20,20,22,0.85);
            --border: rgba(255,255,255,0.06);
            --border-orange: rgba(255,140,0,0.25);
            --text: #f0f0f0;
            --text-2: #9a9a9a;
            --text-3: #555;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --cyan: #06b6d4;
            --yellow: #eab308;

            --src-rereyano: #f97316;
            --src-streamcenter: #06b6d4;
            --src-e1link: #a855f7;
            --src-sportonline: #22c55e;
            --src-donromans: #3b82f6;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-orange); border-radius: 4px; }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(8,8,9,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo img {
            width: 34px;
            height: 34px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px var(--orange-glow));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 17px;
            font-weight: 800;
            color: var(--orange);
            letter-spacing: 3px;
        }

        .header-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        .header-search {
            flex: 1;
            max-width: 420px;
            position: relative;
        }

        .header-search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--border-orange);
        }

        .header-search input::placeholder { color: var(--text-3); }

        .search-icon-inner {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 14px;
            pointer-events: none;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-count {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #ef4444;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse-red 1.4s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .total-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--orange);
            letter-spacing: 1px;
        }

        /* ── LAYOUT ── */
        .layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: sticky;
            top: 88px;
        }

        .sidebar-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .sidebar-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .sport-list { display: flex; flex-direction: column; gap: 4px; }

        .sport-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-2);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
            width: 100%;
        }

        .sport-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

        .sport-btn.active {
            background: var(--orange-dim);
            color: var(--orange);
            font-weight: 600;
        }

        .sport-emoji { font-size: 16px; width: 22px; text-align: center; }

        .sport-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-3);
            font-weight: 600;
        }

        .source-list { display: flex; flex-direction: column; gap: 6px; }

        .source-toggle {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
            width: 100%;
            text-align: left;
        }

        .source-toggle.active { border-color: currentColor; }
        .source-toggle.inactive { opacity: 0.35; }

        .source-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        .source-count { margin-left: auto; font-size: 11px; opacity: 0.6; }

        .stats-mini { display: flex; flex-direction: column; gap: 10px; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .stat-row-label { color: var(--text-2); }
        .stat-row-value { font-weight: 700; color: var(--orange); font-family: 'Orbitron', sans-serif; font-size: 13px; }

        /* ── MAIN CONTENT ── */
        .main { min-width: 0; }

        .filters-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .filter-pill:hover { border-color: var(--border-orange); color: var(--orange); }

        .filter-pill.active {
            background: var(--orange-dim);
            border-color: var(--border-orange);
            color: var(--orange);
        }

        .filter-pill .pill-count {
            background: rgba(255,255,255,0.08);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
        }

        .filter-pill.active .pill-count {
            background: var(--orange);
            color: #000;
        }

        .sort-select {
            margin-left: auto;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .sort-select:focus { outline: none; }

        /* ── GRID ── */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        /* ── EVENT CARD ── */
        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }

        .event-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-orange);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--orange-dim);
        }

        .event-card.selected {
            border-color: var(--orange);
            background: rgba(255,140,0,0.04);
        }

        .card-top {
            padding: 14px 14px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .source-badge {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 4px;
        }

        .card-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--orange);
            cursor: pointer;
        }

        /* Team logos area */
        .card-teams {
            padding: 0 14px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
        }

        .team-vs {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: 1px;
        }

        .team-logo-placeholder {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 20px;
        }

        .card-body { padding: 0 14px 12px; }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.04);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-live {
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .status-soon {
            background: rgba(234,179,8,0.12);
            color: #eab308;
            border: 1px solid rgba(234,179,8,0.2);
        }

        .card-url {
            font-family: monospace;
            font-size: 9px;
            color: var(--text-3);
            background: rgba(0,0,0,0.3);
            padding: 6px 10px;
            border-radius: 6px;
            margin: 0 14px 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-actions {
            padding: 0 14px 14px;
            display: flex;
            gap: 8px;
        }

        .btn-watch {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 0;
            background: var(--orange);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 11px;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-watch:hover {
            background: #ffa020;
            box-shadow: 0 4px 20px rgba(255,140,0,0.4);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-icon:hover { border-color: var(--border-orange); color: var(--orange); }
        .btn-icon.copied { border-color: var(--green); color: var(--green); }

        /* ── SOURCE COLORS ── */
        .src-rereyano   { background: rgba(249,115,22,0.12); color: var(--src-rereyano); }
        .src-streamcenter { background: rgba(6,182,212,0.12); color: var(--src-streamcenter); }
        .src-e1link     { background: rgba(168,85,247,0.12); color: var(--src-e1link); }
        .src-sportonline { background: rgba(34,197,94,0.12); color: var(--src-sportonline); }
        .src-donromans  { background: rgba(59,130,246,0.12); color: var(--src-donromans); }

        /* ── SPORT ICONS MAP ── */

        /* ── LOADING ── */
        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255,140,0,0.1);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--text-3);
            letter-spacing: 3px;
        }

        /* ── EMPTY ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.2; }
        .empty-text { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--text-3); letter-spacing: 2px; }

        /* ── SELECTION BAR ── */
        .sel-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--bg-card2);
            border: 1px solid var(--border-orange);
            border-radius: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px var(--orange-glow);
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sel-bar.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .sel-bar {
                bottom: 0;
                left: 0;
                right: 0;
                transform: translateY(100%);
                border-radius: 16px 16px 0 0;
                width: 100%;
                max-width: 100%;
                flex-wrap: wrap;
                justify-content: center;
                padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 12px));
                gap: 8px;
                border-left: none;
                border-right: none;
                border-bottom: none;
            }

            .sel-bar.visible {
                transform: translateY(0);
            }

            .sel-btn { flex: 1; text-align: center; padding: 12px 10px; }
            .sel-btn.primary { order: -1; flex: 100%; }
        }

        .sel-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--orange);
            font-weight: 700;
            white-space: nowrap;
        }

        .sel-divider { width: 1px; height: 20px; background: var(--border); }

        .sel-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .sel-btn:hover { border-color: var(--border-orange); color: var(--orange); }

        .sel-btn.primary {
            background: var(--orange);
            border-color: var(--orange);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .sel-btn.primary:hover { background: #ffa020; }

        .sel-btn.danger { border-color: rgba(239,68,68,0.3); color: #ef4444; }
        .sel-btn.danger:hover { border-color: #ef4444; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            padding: 10px 24px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 20px;
            color: var(--green);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
            z-index: 1000;
        }

        .toast.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ── PLAYER MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
        }

        .modal-overlay.visible { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-orange);
            border-radius: 16px;
            width: 92vw;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 40px var(--orange-glow);
        }

        .modal-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--orange);
            letter-spacing: 2px;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .modal-close:hover { border-color: var(--border-orange); color: var(--orange); }

        .modal-player {
            flex: 1;
            min-height: 300px;
        }

        .modal-player iframe {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: none;
            display: block;
        }

        /* ── FOOTER ── */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px 24px;
            text-align: center;
        }

        .footer-inner { max-width: 1400px; margin: 0 auto; }

        .footer-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--orange);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .footer-sub { font-size: 12px; color: var(--text-3); }

        /* ── MOBILE ── */
        .mobile-filters-toggle {
            display: none;
            width: 100%;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: left;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 16px;
            }

            .sidebar {
                position: static;
            }

            .sidebar-blocks-wrap {
                display: none;
                flex-direction: column;
                gap: 16px;
            }

            .sidebar-blocks-wrap.open { display: flex; }

            .mobile-filters-toggle { display: block; }

            .header-inner { padding: 0 16px; gap: 12px; }
            .logo-text { display: none; }
            .total-badge { display: none; }

            .events-grid {
                grid-template-columns: 1fr;
            }
        }

        .mobile-search {
            display: none;
            padding: 10px 16px;
            background: rgba(8,8,9,0.95);
            border-bottom: 1px solid var(--border);
        }

        .mobile-search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .mobile-search input:focus { outline: none; border-color: var(--border-orange); }
        .mobile-search input::placeholder { color: var(--text-3); }

        .mobile-search-wrap { position: relative; }

        .mobile-search-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 14px;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .header-search { display: none; }
            .live-count span:last-child { display: none; }
            .mobile-search { display: block; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <img src="/attached_assets/1001854641-removebg-preview_1764606701240.png" alt="L3HO">
            <span class="logo-text">L3HO</span>
        </a>
        <div class="header-divider"></div>
        <div class="header-search">
            <span class="search-icon-inner">&#9906;</span>
            <input type="text" id="search-input" placeholder="Buscar evento, equipo o liga...">
        </div>
        <div class="header-right">
            <div class="live-count" id="live-indicator" style="display:none">
                <div class="pulse-dot"></div>
                <span id="live-count-num">0</span>
                <span>EN VIVO</span>
            </div>
            <span class="total-badge" id="total-badge">···</span>
        </div>
    </div>
</header>

<!-- MOBILE SEARCH -->
<div class="mobile-search">
    <div class="mobile-search-wrap">
        <span class="mobile-search-icon">&#9906;</span>
        <input type="text" id="mobile-search-input" placeholder="Buscar evento, equipo o liga...">
    </div>
</div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <button class="mobile-filters-toggle" onclick="toggleSidebar()">
            ☰ &nbsp; Filtros y Fuentes
        </button>

        <div class="sidebar-blocks-wrap" id="sidebar-blocks">
            <!-- DEPORTES -->
            <div class="sidebar-block">
                <div class="sidebar-label">Deportes</div>
                <div class="sport-list" id="sport-list">
                    <button class="sport-btn active" onclick="filterSport('todos')" data-sport="todos">
                        <span class="sport-emoji">🌐</span>
                        <span>Todos</span>
                        <span class="sport-count" id="sc-todos">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('futbol')" data-sport="futbol">
                        <span class="sport-emoji">⚽</span>
                        <span>Fútbol</span>
                        <span class="sport-count" id="sc-futbol">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('basketball')" data-sport="basketball">
                        <span class="sport-emoji">🏀</span>
                        <span>Baloncesto</span>
                        <span class="sport-count" id="sc-basketball">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('baseball')" data-sport="baseball">
                        <span class="sport-emoji">⚾</span>
                        <span>Béisbol</span>
                        <span class="sport-count" id="sc-baseball">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('hockey')" data-sport="hockey">
                        <span class="sport-emoji">🏒</span>
                        <span>Hockey</span>
                        <span class="sport-count" id="sc-hockey">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('nfl')" data-sport="nfl">
                        <span class="sport-emoji">🏈</span>
                        <span>NFL</span>
                        <span class="sport-count" id="sc-nfl">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('box')" data-sport="box">
                        <span class="sport-emoji">🥊</span>
                        <span>Boxeo / MMA</span>
                        <span class="sport-count" id="sc-box">0</span>
                    </button>
                    <button class="sport-btn" onclick="filterSport('f1')" data-sport="f1">
                        <span class="sport-emoji">🏎️</span>
                        <span>Automovilismo</span>
                        <span class="sport-count" id="sc-f1">0</span>
                    </button>
                </div>
            </div>

            <!-- FUENTES -->
            <div class="sidebar-block">
                <div class="sidebar-label">Fuentes</div>
                <div class="source-list">
                    <button class="source-toggle active src-rereyano" id="tog-Rereyano" onclick="toggleSource('Rereyano')">
                        <span class="source-dot" style="background:var(--src-rereyano)"></span>
                        Rereyano
                        <span class="source-count" id="cnt-Rereyano">0</span>
                    </button>
                    <button class="source-toggle active src-streamcenter" id="tog-StreamCenter" onclick="toggleSource('StreamCenter')">
                        <span class="source-dot" style="background:var(--src-streamcenter)"></span>
                        StreamCenter
                        <span class="source-count" id="cnt-StreamCenter">0</span>
                    </button>
                    <button class="source-toggle active src-e1link" id="tog-E1Link" onclick="toggleSource('E1Link')">
                        <span class="source-dot" style="background:var(--src-e1link)"></span>
                        E1Link
                        <span class="source-count" id="cnt-E1Link">0</span>
                    </button>
                    <button class="source-toggle active src-sportonline" id="tog-SportOnline" onclick="toggleSource('SportOnline')">
                        <span class="source-dot" style="background:var(--src-sportonline)"></span>
                        SportOnline
                        <span class="source-count" id="cnt-SportOnline">0</span>
                    </button>
                    <button class="source-toggle active src-donromans" id="tog-DonRomans" onclick="toggleSource('DonRomans')">
                        <span class="source-dot" style="background:var(--src-donromans)"></span>
                        DonRomans
                        <span class="source-count" id="cnt-DonRomans">0</span>
                    </button>
                </div>
            </div>

            <!-- STATS -->
            <div class="sidebar-block">
                <div class="sidebar-label">Estadísticas</div>
                <div class="stats-mini">
                    <div class="stat-row">
                        <span class="stat-row-label">Total eventos</span>
                        <span class="stat-row-value" id="stat-total">–</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-row-label">En vivo</span>
                        <span class="stat-row-value" id="stat-live" style="color:var(--red)">–</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-row-label">Fuentes activas</span>
                        <span class="stat-row-value" id="stat-sources">5</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-row-label">Actualizado</span>
                        <span class="stat-row-value" id="stat-updated" style="font-size:9px;letter-spacing:0">–</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <!-- FILTER PILLS / SORT -->
        <div class="filters-bar" id="filters-bar">
            <button class="filter-pill active" onclick="filterEstado('todos')" id="pill-todos">
                Todos <span class="pill-count" id="pc-todos">0</span>
            </button>
            <button class="filter-pill" onclick="filterEstado('En vivo')" id="pill-live">
                🔴 En Vivo <span class="pill-count" id="pc-live">0</span>
            </button>
            <button class="filter-pill" onclick="filterEstado('Por comenzar')" id="pill-soon">
                🟡 Por Comenzar <span class="pill-count" id="pc-soon">0</span>
            </button>
            <button class="filter-pill" onclick="filterEstado('Programado')" id="pill-sched">
                ⚪ Programado <span class="pill-count" id="pc-sched">0</span>
            </button>
            <select class="sort-select" id="sort-select" onchange="applyFilters()">
                <option value="name">A–Z</option>
                <option value="source">Por Fuente</option>
                <option value="status">Por Estado</option>
            </select>
        </div>

        <!-- GRID -->
        <div class="events-grid" id="events-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p class="loading-label">Cargando Transmisiones</p>
            </div>
        </div>
    </main>
</div>

<!-- SELECTION BAR -->
<div class="sel-bar" id="sel-bar">
    <span class="sel-count" id="sel-count">0 seleccionados</span>
    <div class="sel-divider"></div>
    <button class="sel-btn primary" onclick="copySelectedLinks()">COPIAR LINKS</button>
    <button class="sel-btn" onclick="selectAll()">Todos</button>
    <button class="sel-btn danger" onclick="deselectAll()">Cancelar</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PLAYER MODAL -->
<div class="modal-overlay" id="player-modal" onclick="closePlayer(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modal-event-title">REPRODUCIENDO</span>
            <button class="modal-close" onclick="closePlayer()">✕</button>
        </div>
        <div class="modal-player">
            <iframe id="player-iframe" src="" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-inner">
        <div class="footer-logo">L3HO × ULTRAGOL</div>
        <p class="footer-sub">Transmisiones deportivas en vivo · Todos los derechos reservados 2026</p>
    </div>
</footer>

<script>
    let allLinks = [];
    let selectedLinks = new Map();
    let activeSport = 'todos';
    let activeEstado = 'todos';
    let activeSources = new Set(['Rereyano','StreamCenter','E1Link','SportOnline','DonRomans']);
    let sidebarOpen = false;

    const oldPrefix = 'https://cmrroto01.blogspot.com/p/aldoblock.html?get=';
    const newPrefix = 'https://ultragol-api-3.vercel.app/ultragol-l3ho?get=';

    const SPORT_KW = {
        futbol: ['futbol','soccer','liga','premier','laliga','bundesliga','serie a','ligue','champions','europa','copa','mundial','fc','united','city','real madrid','barcelona','america','chivas','cruz azul','tigres','monterrey','pumas','mls','concacaf','fútbol','liga mx'],
        basketball: ['nba','basketball','baloncesto','lakers','celtics','warriors','bulls','heat','nets','knicks','timberwolves','pacers','hornets'],
        baseball: ['mlb','baseball','béisbol','beisbol','yankees','dodgers','red sox','cubs','mets','astros','padres'],
        hockey: ['nhl','hockey','oilers','avalanche','predators','kraken','leafs','canadiens'],
        nfl: ['nfl','football americano','super bowl','patriots','cowboys','packers','chiefs','eagles','bears'],
        box: ['box','boxing','boxeo','ufc','mma','fight','pelea','canelo','tyson','fury','wwe','lucha'],
        f1: ['f1','formula 1','formula1','nascar','racing','gran premio','gp','motogp','indycar','motor']
    };

    const SOURCE_CLASS = {
        'Rereyano': 'src-rereyano',
        'StreamCenter': 'src-streamcenter',
        'E1Link': 'src-e1link',
        'SportOnline': 'src-sportonline',
        'DonRomans': 'src-donromans'
    };

    const SPORT_ICON = {
        futbol: '⚽', basketball: '🏀', baseball: '⚾', hockey: '🏒',
        nfl: '🏈', box: '🥊', f1: '🏎️'
    };

    function convertUrl(url) {
        return url.replace(oldPrefix, newPrefix);
    }

    function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        document.getElementById('sidebar-blocks').classList.toggle('open', sidebarOpen);
    }

    function detectSport(link) {
        const text = (link.name + ' ' + (link.deporte || '')).toLowerCase();
        for (const [sport, kws] of Object.entries(SPORT_KW)) {
            if (kws.some(k => text.includes(k))) return sport;
        }
        return null;
    }

    function matchesSport(link) {
        if (activeSport === 'todos') return true;
        return detectSport(link) === activeSport;
    }

    function matchesEstado(link) {
        if (activeEstado === 'todos') return true;
        return (link.estado || 'Programado') === activeEstado;
    }

    function matchesSource(link) {
        return activeSources.has(link.source);
    }

    function matchesSearch(link, q) {
        if (!q) return true;
        return (link.name + ' ' + (link.source || '') + ' ' + (link.deporte || '')).toLowerCase().includes(q);
    }

    function applyFilters() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        const sort = document.getElementById('sort-select').value;

        let filtered = allLinks.filter(l =>
            matchesSport(l) && matchesEstado(l) && matchesSource(l) && matchesSearch(l, q)
        );

        if (sort === 'source') {
            filtered.sort((a, b) => a.source.localeCompare(b.source));
        } else if (sort === 'status') {
            const order = { 'En vivo': 0, 'Por comenzar': 1, 'Programado': 2 };
            filtered.sort((a, b) => (order[a.estado] ?? 2) - (order[b.estado] ?? 2));
        } else {
            filtered.sort((a, b) => a.name.localeCompare(b.name, 'es', { sensitivity: 'base' }));
        }

        renderCards(filtered);
    }

    function filterSport(sport) {
        activeSport = sport;
        document.querySelectorAll('.sport-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
        applyFilters();
    }

    function filterEstado(estado) {
        activeEstado = estado;
        document.querySelectorAll('[id^="pill-"]').forEach(p => p.classList.remove('active'));
        const map = { 'todos': 'pill-todos', 'En vivo': 'pill-live', 'Por comenzar': 'pill-soon', 'Programado': 'pill-sched' };
        if (map[estado]) document.getElementById(map[estado])?.classList.add('active');
        applyFilters();
    }

    function toggleSource(src) {
        if (activeSources.has(src)) {
            activeSources.delete(src);
            document.getElementById('tog-' + src)?.classList.remove('active');
            document.getElementById('tog-' + src)?.classList.add('inactive');
        } else {
            activeSources.add(src);
            document.getElementById('tog-' + src)?.classList.add('active');
            document.getElementById('tog-' + src)?.classList.remove('inactive');
        }
        document.getElementById('stat-sources').textContent = activeSources.size;
        applyFilters();
    }

    function updateCounts() {
        const total = allLinks.length;
        const live = allLinks.filter(l => l.estado === 'En vivo').length;
        const soon = allLinks.filter(l => l.estado === 'Por comenzar').length;
        const sched = allLinks.filter(l => l.estado === 'Programado').length;

        document.getElementById('total-badge').textContent = total + ' EVENTOS';
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-live').textContent = live;

        document.getElementById('pc-todos').textContent = total;
        document.getElementById('pc-live').textContent = live;
        document.getElementById('pc-soon').textContent = soon;
        document.getElementById('pc-sched').textContent = sched;

        if (live > 0) {
            document.getElementById('live-indicator').style.display = 'flex';
            document.getElementById('live-count-num').textContent = live;
        }

        // sport counts
        const sports = ['futbol','basketball','baseball','hockey','nfl','box','f1'];
        sports.forEach(s => {
            const n = allLinks.filter(l => detectSport(l) === s).length;
            const el = document.getElementById('sc-' + s);
            if (el) el.textContent = n;
        });
        document.getElementById('sc-todos').textContent = total;

        // source counts
        ['Rereyano','StreamCenter','E1Link','SportOnline','DonRomans'].forEach(src => {
            const n = allLinks.filter(l => l.source === src).length;
            const el = document.getElementById('cnt-' + src);
            if (el) el.textContent = n;
        });
    }

    function renderCards(links) {
        const grid = document.getElementById('events-grid');

        if (!links.length) {
            grid.innerHTML = `<div class="empty-state">
                <div class="empty-icon">📭</div>
                <p class="empty-text">Sin resultados</p>
            </div>`;
            return;
        }

        grid.innerHTML = links.map(link => {
            const url = convertUrl(link.url);
            const srcClass = SOURCE_CLASS[link.source] || '';
            const estado = link.estado || 'Programado';
            const sport = detectSport(link);
            const sportIcon = SPORT_ICON[sport] || '🎯';
            const isSelected = selectedLinks.has(link.url);

            const logoSection = (link.logo1 || link.logo2) ? `
                <div class="card-teams">
                    ${link.logo1
                        ? `<img class="team-logo" src="${link.logo1}" alt="team1" onerror="this.style.display='none'">`
                        : `<div class="team-logo-placeholder">${sportIcon}</div>`}
                    <span class="team-vs">VS</span>
                    ${link.logo2
                        ? `<img class="team-logo" src="${link.logo2}" alt="team2" onerror="this.style.display='none'">`
                        : `<div class="team-logo-placeholder">${sportIcon}</div>`}
                </div>` : '';

            const statusTag = estado === 'En vivo'
                ? `<span class="meta-tag status-live">🔴 EN VIVO</span>`
                : estado === 'Por comenzar'
                    ? `<span class="meta-tag status-soon">🟡 POR COMENZAR</span>`
                    : '';

            const horaTag = link.hora ? `<span class="meta-tag">${link.hora}</span>` : '';
            const depTag = (link.deporte && link.deporte !== 'null')
                ? `<span class="meta-tag">${sportIcon} ${link.deporte}</span>`
                : `<span class="meta-tag">${sportIcon}</span>`;

            return `
            <div class="event-card${isSelected ? ' selected' : ''}"
                 data-url="${encodeURIComponent(link.url)}"
                 data-name="${encodeURIComponent(link.name)}">
                <div class="card-top">
                    <span class="source-badge ${srcClass}">${link.source}</span>
                    <input type="checkbox" class="card-checkbox"
                        ${isSelected ? 'checked' : ''}
                        onchange="toggleSel('${encodeURIComponent(link.url)}','${encodeURIComponent(link.name)}',this.checked)"
                        onclick="event.stopPropagation()">
                </div>
                ${logoSection}
                <div class="card-body">
                    <div class="card-title">${link.name}</div>
                    <div class="card-meta">
                        ${statusTag}
                        ${horaTag}
                        ${depTag}
                    </div>
                </div>
                <div class="card-url">${url}</div>
                <div class="card-actions">
                    <button class="btn-watch" onclick="openPlayer('${url.replace(/'/g,"\\'")}','${link.name.replace(/'/g,"\\'")}')" >
                        ▶ VER
                    </button>
                    <button class="btn-icon" onclick="copyLink(this,'${url.replace(/'/g,"\\'")}',event)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function openPlayer(url, title) {
        document.getElementById('player-iframe').src = url;
        document.getElementById('modal-event-title').textContent = title || 'REPRODUCIENDO';
        document.getElementById('player-modal').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }

    function closePlayer(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('player-iframe').src = '';
        document.getElementById('player-modal').classList.remove('visible');
        document.body.style.overflow = '';
    }

    function toggleSel(encUrl, encName, checked) {
        const url = decodeURIComponent(encUrl);
        const name = decodeURIComponent(encName);
        const card = document.querySelector(`[data-url="${encUrl}"]`);
        if (checked) {
            selectedLinks.set(url, name);
            card?.classList.add('selected');
        } else {
            selectedLinks.delete(url);
            card?.classList.remove('selected');
        }
        updateSelBar();
    }

    function selectAll() {
        document.querySelectorAll('.event-card').forEach(card => {
            const url = decodeURIComponent(card.dataset.url);
            const name = decodeURIComponent(card.dataset.name);
            selectedLinks.set(url, name);
            card.classList.add('selected');
            const cb = card.querySelector('.card-checkbox');
            if (cb) cb.checked = true;
        });
        updateSelBar();
    }

    function deselectAll() {
        selectedLinks.clear();
        document.querySelectorAll('.event-card').forEach(card => {
            card.classList.remove('selected');
            const cb = card.querySelector('.card-checkbox');
            if (cb) cb.checked = false;
        });
        updateSelBar();
    }

    function updateSelBar() {
        const bar = document.getElementById('sel-bar');
        const count = document.getElementById('sel-count');
        const n = selectedLinks.size;
        if (n > 0) {
            bar.classList.add('visible');
            count.textContent = `${n} seleccionado${n > 1 ? 's' : ''}`;
        } else {
            bar.classList.remove('visible');
        }
    }

    function copySelectedLinks() {
        if (!selectedLinks.size) return;
        let text = `🔴 L3HO ELITE · Links de Transmisión\n🌐 ultragol-l3ho.com.mx\n\n`;
        let i = 1;
        for (const [url, name] of selectedLinks) {
            text += `Opción ${i}: ${name}\n${convertUrl(url)}\n\n`;
            i++;
        }
        copyText(text, `${selectedLinks.size} LINK${selectedLinks.size > 1 ? 'S' : ''} COPIADO${selectedLinks.size > 1 ? 'S' : ''}`);
    }

    function copyLink(btn, url, event) {
        if (event) event.stopPropagation();
        copyText(url, 'LINK COPIADO');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        }, 2000);
    }

    function copyText(text, msg) {
        navigator.clipboard.writeText(text).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        });
        showToast(msg);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 2500);
    }

    async function loadData() {
        try {
            const res = await fetch('/api/l3ho-links');
            const data = await res.json();

            if (!data.success) throw new Error('API error');

            allLinks = data.links;
            document.getElementById('stat-updated').textContent = data.actualizado || 'Ahora';
            updateCounts();
            applyFilters();
        } catch (e) {
            document.getElementById('events-grid').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <p class="empty-text">Error al cargar. Intenta de nuevo.</p>
                </div>`;
        }
    }

    // Open sidebar by default on desktop
    if (window.innerWidth > 900) {
        document.getElementById('sidebar-blocks').classList.add('open');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const mobileInput = document.getElementById('mobile-search-input');
        if (mobileInput) mobileInput.value = e.target.value;
        applyFilters();
    });

    document.getElementById('mobile-search-input').addEventListener('input', (e) => {
        document.getElementById('search-input').value = e.target.value;
        applyFilters();
    });

    loadData();
</script>
</body>
</html>
